<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StarQ · Pipeline Tester</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:#0b0e11;
  --surface:#12171d;
  --border:#1e2830;
  --accent:#00e5a0;
  --accent2:#0094ff;
  --warn:#ff5f5f;
  --text:#dce8f0;
  --muted:#556070;
  --mono:'IBM Plex Mono', monospace;
  --sans:'Syne', sans-serif;
}

html, body {
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:14px;
  line-height:1.6;
}

.shell {
  display:grid;
  grid-template-rows:auto 1fr auto;
  min-height:100vh;
}

header {
  border-bottom:1px solid var(--border);
  padding:18px 32px;
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-mark {
  width:32px;
  height:32px;
  background:var(--accent);
  border-radius:6px;
  display:grid;
  place-items:center;
  font-family:var(--sans);
  font-weight:800;
  color:#000;
}

header h1 {
  font-family:var(--sans);
  font-size:18px;
  font-weight:800;
}

header h1 span {
  color:var(--accent);
}

.pill {
  margin-left:auto;
  color:var(--muted);
  border:1px solid var(--border);
  border-radius:20px;
  padding:3px 10px;
  font-size:11px;
}

main {
  padding:40px 32px;
  max-width:1100px;
  width:100%;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:32px;
}

.section-label {
  font-size:10px;
  letter-spacing:2px;
  color:var(--muted);
  margin-bottom:12px;
}

#drop-zone {
  border:1.5px dashed var(--border);
  border-radius:12px;
  background:var(--surface);
  padding:48px 32px;
  text-align:center;
  cursor:pointer;
}

.drop-icon {
  font-size:36px;
}

.drop-title {
  font-family:var(--sans);
  font-size:20px;
  font-weight:700;
  color:white;
}

.drop-sub {
  color:var(--muted);
  font-size:12px;
}

.drop-sub strong {
  color:var(--accent);
  cursor:pointer;
}

#file-input {
  display:none;
}

.config-bar {
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 16px;
  flex-wrap:wrap;
}

.config-bar label {
  color:var(--muted);
  font-size:11px;
}

.config-bar input,
.config-bar select {
  flex:1;
  min-width:220px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:6px;
  padding:6px 10px;
  color:var(--text);
}
.config-bar input:focus,
.config-bar select:focus {
  outline:none;
  border-color:var(--accent2);
}

#upload-btn {
  background:var(--accent);
  color:#000;
  border:none;
  border-radius:8px;
  padding:11px 28px;
  font-family:var(--sans);
  font-weight:700;
  cursor:pointer;
}

#upload-btn:disabled {
  opacity:.4;
  cursor:not-allowed;
}

#file-chip {
  display:none;
  align-items:center;
  gap:10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 14px;
}

#file-chip.show {
  display:flex;
}

.chip-remove {
  margin-left:auto;
  cursor:pointer;
}

/* ── Status bar ─────────────────────────────────────────────────────────── */
#status-bar {
  display:none;
  align-items:center;
  gap:10px;
  padding:10px 16px;
  border-radius:8px;
  font-size:12px;
  border:1px solid var(--border);
}
#status-bar.show       { display:flex; }
#status-bar.show.ok    { border-color:#00e5a055; background:#00e5a010; color:var(--accent); }
#status-bar.show.error { border-color:#ff5f5f55; background:#ff5f5f10; color:var(--warn); }
#status-bar.show.info  { border-color:#0094ff55; background:#0094ff10; color:var(--accent2); }

/* ── Results section ────────────────────────────────────────────────────── */
#results { display:none; flex-direction:column; gap:24px; }
#results.show { display:flex; }

/* ── Stat cards ─────────────────────────────────────────────────────────── */
.stat-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
  gap:12px;
}
.stat-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px 14px;
}
.stat-val {
  font-family:var(--sans);
  font-size:20px;
  font-weight:800;
  color:var(--accent);
  word-break:break-all;
}
.stat-key {
  font-size:10px;
  letter-spacing:1px;
  color:var(--muted);
  margin-top:4px;
}

/* ── Table wrapper ──────────────────────────────────────────────────────── */
.table-wrap {
  background:var(--surface);
  border:1px solid #2a3d50;
  border-radius:10px;
  overflow:hidden;
}
.table-head {
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 16px;
  border-bottom:1px solid #2a3d50;
  font-family:var(--sans);
  font-weight:700;
  font-size:13px;
}
.badge {
  margin-left:auto;
  background:var(--bg);
  border:1px solid #2a3d50;
  border-radius:20px;
  padding:2px 10px;
  font-size:11px;
  color:var(--muted);
  font-family:var(--mono);
  font-weight:400;
}
.tbl-scroll { overflow-x:auto; width:100%; }

/* ── Table styles ───────────────────────────────────────────────────────── */
table {
  width:100%;
  border-collapse:collapse;
  font-size:12.5px;
  min-width:680px;
}
thead tr {
  background:#0d1117;
}
thead th {
  color:#6b8599;
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  padding:12px 16px;
  text-align:left;
  white-space:nowrap;
  border-bottom:2px solid #2a3d50;
  border-right:1px solid #2a3d50;
}
thead th:last-child { border-right:none; }

tbody tr { border-bottom:1px solid #1e2d3d; }
tbody tr:nth-child(even) { background:rgba(255,255,255,.018); }
tbody tr:last-child      { border-bottom:none; }
tbody tr:hover           { background:rgba(0,229,160,.06); }

tbody td {
  padding:11px 16px;
  vertical-align:middle;
  white-space:nowrap;
  border-right:1px solid #1e2d3d;
}
tbody td:last-child { border-right:none; }

/* customer name column can wrap */
tbody td:first-child {
  white-space:normal;
  min-width:150px;
  max-width:200px;
  line-height:1.4;
}

td.num {
  text-align:right;
  font-variant-numeric:tabular-nums;
  min-width:120px;
  color:#dce8f0;
}
td.due {
  text-align:right;
  font-variant-numeric:tabular-nums;
  min-width:120px;
  color:#ff6b6b;
  font-weight:600;
}
td.ok {
  text-align:right;
  font-variant-numeric:tabular-nums;
  min-width:120px;
  color:#00e5a0;
}

/* ── Pipeline log ───────────────────────────────────────────────────────── */
.log-block {
  background:#0d1117;
  border:1px solid #2a3d50;
  border-radius:8px;
  padding:14px 16px;
  font-size:11.5px;
  line-height:1.8;
  max-height:220px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}
.log-line       { display:block; color:#556070; }
.log-line.ok    { color:#00e5a0; }
.log-line.err   { color:#ff6b6b; }
.log-line.info  { color:#0094ff; }

footer {
  border-top:1px solid var(--border);
  padding:14px 32px;
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--muted);
}

</style>
</head>

<body>

<div class="shell">

<header>
  <div class="logo-mark">SQ</div>
  <h1>Star<span>Q</span> Pipeline Tester</h1>
  <div class="pill">in-memory buffer · no disk write</div>
</header>

<main>

<section>

<p class="section-label">01 · Upload CSV</p>

<div id="drop-zone">

<span class="drop-icon">📂</span>

<p class="drop-title">
Drop your CSV here
</p>

<p class="drop-sub">
or <strong id="browse-link">browse files</strong>
</p>

<input
type="file"
id="file-input"
accept=".csv,.xlsx,.xls">

</div>

<div id="file-chip" style="margin-top:12px;">
  <span>📄</span>
  <span class="chip-name" id="chip-name">—</span>
  <span class="chip-size" id="chip-size">—</span>
  <span class="chip-remove" id="chip-remove">✕</span>
</div>

<!-- NEW REQUIRED DROPDOWN -->

<div class="config-bar" style="margin-top:16px;">

<label>Upload Target *</label>

<select id="pipeline-select">

<option value="">
-- Select Pipeline --
</option>

<option value="customers">
Customers Database
</option>

<option value="inventory">
Inventory Database
</option>

<option value="sales">
Sales Database
</option>

</select>

</div>

</section>

<section>

<p class="section-label">
02 · Backend URL
</p>

<div class="config-bar">

<label>POST endpoint</label>

<input
type="text"
id="backend-url"
value="http://localhost:8000/upload">

<button id="upload-btn" disabled>
<span id="btn-label">
Run Pipeline
</span>
</button>

</div>

</section>
<!-- Status -->
<div id="status-bar">
  <span id="status-icon"></span>
  <span id="status-msg"></span>
</div>

<!-- Results -->
<section id="results">

<p class="section-label">
03 · Results
</p>

<div class="stat-grid" id="stat-grid"></div>

<div class="table-wrap" id="customers-table-wrap">

<div class="table-head">
Customers Preview
<span class="badge" id="customers-badge">—</span>
</div>

<div class="tbl-scroll">
<table id="customers-table"></table>
</div>

</div>

<div class="table-wrap" id="dues-table-wrap">

<div class="table-head">
Outstanding Dues
<span class="badge" id="dues-badge">—</span>
</div>

<div class="tbl-scroll">
<table id="dues-table"></table>
</div>

</div>

<p class="section-label" style="margin-top:8px;">
Pipeline Log
</p>

<div class="log-block" id="log-block"></div>

</section>

</main>

<footer>
<span>StarQ ETL · in-memory buffer test harness</span>
<span id="ts">—</span>
</footer>

</div>

<script>

const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const browseLink = document.getElementById('browse-link');

const fileChip   = document.getElementById('file-chip');
const chipName   = document.getElementById('chip-name');
const chipSize   = document.getElementById('chip-size');
const chipRemove = document.getElementById('chip-remove');

const uploadBtn  = document.getElementById('upload-btn');
const btnLabel   = document.getElementById('btn-label');

const backendUrl = document.getElementById('backend-url');

/* NEW */
const pipelineSelect =
document.getElementById('pipeline-select');

const statusBar  =
document.getElementById('status-bar');

const statusIcon =
document.getElementById('status-icon');

const statusMsg =
document.getElementById('status-msg');

const results =
document.getElementById('results');

let selectedFile = null;

function fmtSize(bytes){

if(bytes < 1024)
return bytes + ' B';

if(bytes < 1024*1024)
return (bytes/1024).toFixed(1)+' KB';

return (bytes/(1024*1024)).toFixed(2)+' MB';

}

function fmtNum(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return val ?? '';
  return n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function setFile(file){

if(!file) return;

selectedFile = file;

chipName.textContent = file.name;

chipSize.textContent =
fmtSize(file.size);

fileChip.classList.add('show');

/* changed */
uploadBtn.disabled =
!pipelineSelect.value;

}
function clearFile(){

selectedFile = null;

fileInput.value = '';

fileChip.classList.remove('show');

uploadBtn.disabled = true;

}

dropZone.addEventListener('dragover', e => {
e.preventDefault();
});

dropZone.addEventListener('drop', e => {

e.preventDefault();

setFile(
e.dataTransfer.files[0]
);

});

dropZone.addEventListener('click', () => {
fileInput.click();
});

browseLink.addEventListener('click', e => {

e.stopPropagation();

fileInput.click();

});

fileInput.addEventListener('change', () => {

setFile(
fileInput.files[0]
);

});

chipRemove.addEventListener(
'click',
clearFile
);

/* NEW */
pipelineSelect.addEventListener(
'change',
() => {

uploadBtn.disabled =
!(
selectedFile &&
pipelineSelect.value
);

}
);

function setStatus(type,msg){

statusBar.className =
'show ' + type;

statusMsg.textContent = msg;

}

function clearStatus(){

statusBar.className='';

}

// ── Table renderer (generic flat rows) ────────────────────────────────────
  function renderTable(tableEl, rows) {
    if (!rows || rows.length === 0) {
      tableEl.innerHTML = '<tr><td style="color:var(--muted);padding:16px">No data</td></tr>';
      return;
    }
    const cols = Object.keys(rows[0]);
    let html = '<thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
    rows.forEach(row => {
      html += '<tr>' + cols.map(c => `<td title="${row[c] ?? ''}">${row[c] ?? ''}</td>`).join('') + '</tr>';
    });
    html += '</tbody>';
    tableEl.innerHTML = html;
  }

  // ── Customer preview renderer ─────────────────────────────────────────────
  // Flattens the nested preview object into a readable table row.
  function renderCustomerPreview(tableEl, preview) {
    if (!preview || preview.length === 0) {
      tableEl.innerHTML = '<tr><td style="color:var(--muted);padding:16px">No data</td></tr>';
      return;
    }
    const headers = ['Customer', 'City', 'Transactions', 'Line Items', 'Total Billed', 'Collected', 'Due', 'First DC', 'First Date'];
    let html = '<thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
    preview.forEach(c => {
      const due       = c.Total_Due;
      const dueClass  = (due && Number(due) > 0) ? 'due' : 'ok';
      const dueVal    = (due !== '' && due !== null && due !== undefined) ? fmtNum(due) : '0';
      const firstTxn  = c.first_transaction;
      html += `<tr>
        <td title="${c.Customer}">${c.Customer}</td>
        <td>${c.City || '—'}</td>
        <td class="num">${c.transaction_count}</td>
        <td class="num">${c.item_count}</td>
        <td class="num">₹${fmtNum(c.Total_Amount_to_be_Paid)}</td>
        <td class="num">₹${fmtNum(c.Collection)}</td>
        <td class="${dueClass}">₹${dueVal}</td>
        <td>${firstTxn ? (firstTxn.DC_No || '—') : '—'}</td>
        <td>${firstTxn ? (firstTxn.Date || '—') : '—'}</td>
      </tr>`;
    });
    html += '</tbody>';
    tableEl.innerHTML = html;
  }

  // ── Dues renderer — customers where Total_Due > 0 ─────────────────────────
  function renderDuesPreview(tableEl, preview) {
    const withDues = (preview || []).filter(c => c.Total_Due && Number(c.Total_Due) > 0);
    if (withDues.length === 0) {
      tableEl.innerHTML = '<tr><td style="color:var(--accent);padding:16px">All dues cleared ✓</td></tr>';
      return;
    }
    const headers = ['Customer', 'City', 'Total Billed', 'Collected', 'Due'];
    let html = '<thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
    withDues.forEach(c => {
      html += `<tr>
        <td title="${c.Customer}">${c.Customer}</td>
        <td>${c.City || '—'}</td>
        <td class="num">₹${fmtNum(c.Total_Amount_to_be_Paid)}</td>
        <td class="num">₹${fmtNum(c.Collection)}</td>
        <td class="due">₹${fmtNum(c.Total_Due)}</td>
      </tr>`;
    });
    html += '</tbody>';
    tableEl.innerHTML = html;
  }

  // ── Log helper ────────────────────────────────────────────────────────────
  function addLog(msg, cls = '') {
    const lb = document.getElementById('log-block');
    const span = document.createElement('span');
    span.className = 'log-line ' + cls;
    span.textContent = '› ' + msg;
    lb.appendChild(span);
    lb.scrollTop = lb.scrollHeight;
  }

  // ── Upload ─────────────────────────────────────────────────────────────────
  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    const url = backendUrl.value.trim();
    if (!url) { setStatus('error', 'Enter a backend URL.'); return; }

    // Reset UI
    uploadBtn.disabled = true;
    btnLabel.textContent = 'Running…';
    results.classList.remove('show');
    document.getElementById('log-block').innerHTML = '';
    document.getElementById('stat-grid').innerHTML = '';
    setStatus('info', 'Uploading file and processing pipeline…');

    addLog(`File: ${selectedFile.name} (${fmtSize(selectedFile.size)})`, 'info');
    addLog('POST → ' + url, 'info');

    const form = new FormData();
    form.append('file', selectedFile);
    form.append('pipeline', pipelineSelect.value);

    const t0 = performance.now();
    try {
      const res  = await fetch(url, { method: 'POST', body: form });
      const data = await res.json();
      const elapsed = ((performance.now() - t0) / 1000).toFixed(2);

      if (!res.ok) throw new Error(data.detail || 'Server error ' + res.status);

      // ── Guard: ensure expected fields exist ──────────────────────────────
      if (!data.summary) throw new Error('Unexpected response shape from server (missing summary).');

      const s = data.summary;

      // ── Pipeline log ─────────────────────────────────────────────────────
      addLog(`[1/5] Loaded ${data.file_size_kb} KB into memory buffer`, 'ok');
      addLog(`[2/5] Extracted ${s.customers} customers · ${s.transactions} transactions · ${s.line_items} line items`, 'ok');
      addLog(`[3/5] Cleaned — types cast, mobiles normalised`, 'ok');
      addLog(`[4/5] Reconciled — ${s.customers} customer documents`, 'ok');
      addLog(`[5/5] Uploaded to MongoDB ✓`, 'ok');
      addLog(`Done in ${elapsed}s`, 'ok');

      setStatus('ok',
        `Pipeline complete — ${s.customers} customers · ${s.transactions} transactions · ${s.line_items} items in ${elapsed}s`
      );
      document.getElementById('ts').textContent = new Date().toLocaleTimeString();

      // ── Stat cards ───────────────────────────────────────────────────────
      const stats = [
        { val: data.file_size_kb + ' KB', key: 'File size (RAM only)' },
        { val: s.customers,               key: 'Customers' },
        { val: s.transactions,            key: 'Transactions' },
        { val: s.line_items,              key: 'Line items' },
        { val: s.customers_with_dues,     key: 'With outstanding dues' },
        { val: elapsed + 's',             key: 'Total time' },
      ];
      document.getElementById('stat-grid').innerHTML = stats.map(st =>
        `<div class="stat-card"><div class="stat-val">${st.val}</div><div class="stat-key">${st.key}</div></div>`
      ).join('');

      // ── Preview tables ───────────────────────────────────────────────────
      document.getElementById('customers-badge').textContent = `${s.customers} total`;
      document.getElementById('dues-badge').textContent      = `${s.customers_with_dues} outstanding`;

      renderCustomerPreview(document.getElementById('customers-table'), data.preview);
      renderDuesPreview(document.getElementById('dues-table'), data.preview);

      results.classList.add('show');

    } catch (err) {
      addLog('Error: ' + err.message, 'err');
      setStatus('error', err.message);
    } finally {
      uploadBtn.disabled = false;
      btnLabel.textContent = 'Run Pipeline';
    }
  });
</script>
</body>
</html>
